<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SurfLog{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  {% if session.token %}
  <nav>
    <a href="{{ url_for('home') }}" class="nav-brand">SurfLog</a>
    <div class="nav-links">
      <a href="{{ url_for('home') }}"      {% if request.endpoint == 'home'   %}class="active"{% endif %}>Spots</a>
      <a href="{{ url_for('logs') }}"      {% if request.endpoint == 'logs'   %}class="active"{% endif %}>Logs</a>
      <a href="{{ url_for('boards') }}"    {% if request.endpoint == 'boards' %}class="active"{% endif %}>Boards</a>
      <a href="{{ url_for('logout') }}" class="logout">Log out</a>
    </div>
  </nav>
  {% endif %}

  <main>
    {% for msg in get_flashed_messages(with_categories=True) %}
      <div class="flash flash-{{ msg[0] }}">{{ msg[1] }}</div>
    {% endfor %}

    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
