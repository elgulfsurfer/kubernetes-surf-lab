apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: surflog
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: surflog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: surflog-registry
      containers:
        - name: backend
          image: ghcr.io/elgulfsurfer/surflog-backend:v2
          ports:
            - containerPort: 5000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: surflog-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://surflog:$(POSTGRES_PASSWORD)@postgres:5432/surflog"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: surflog-secret
                  key: JWT_SECRET
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: surflog-secret
                  key: ADMIN_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
