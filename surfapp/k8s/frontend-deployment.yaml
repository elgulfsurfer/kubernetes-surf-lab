apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: surflog
spec:
  selector:
    app: frontend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: surflog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: surflog-registry
      containers:
        - name: frontend
          image: ghcr.io/elgulfsurfer/surflog-frontend:v1
          ports:
            - containerPort: 8080
          env:
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: surflog-config
                  key: BACKEND_URL
            - name: FLASK_SECRET
              valueFrom:
                secretKeyRef:
                  name: surflog-secret
                  key: FLASK_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
