apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resume-app
  template:
    metadata:
      labels:
        app: resume-app
    spec:
      imagePullSecrets:
        - name: ghcr-elgulfsurfer
      containers:
        - name: resume-app
          image: ghcr.io/elgulfsurfer/kubernetes-lab-resume-app:latest
          args:
            - "f"
            - "/etc/config/resume.json"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: resume-app-config
              mountPath: /etc/config
      volumes:
        - name: resume-app-config
          configMap:
            name: resume-config-map