# Example: nginx Deployment + PVC + public ALB Ingress
#
# Prerequisites (run after terraform apply):
#   1. kubectl apply -f k8s/storageclass.yaml
#   2. Install the AWS Load Balancer Controller via Helm (see README)
#      The controller must be annotated with the lbc_role_arn Terraform output.
#
# Apply with: kubectl apply -f k8s/nginx-example.yaml

---
apiVersion: v1
kind: Namespace
metadata:
  name: demo

---
# PersistentVolumeClaim — dynamically provisions a gp3 EBS volume
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-data
  namespace: demo
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-gp3
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /usr/share/nginx/html
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nginx-data

---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: demo
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80

---
# Ingress — the AWS Load Balancer Controller watches this and provisions a
# public-facing ALB in the public subnets tagged kubernetes.io/role/elb=1.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx
  namespace: demo
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
